name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    name: Extension checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate bundle (manifest, assets, popup logic)
        run: node test/run.mjs
